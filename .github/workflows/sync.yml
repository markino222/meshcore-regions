name: sync

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run sync
        id: run
        env:
          KIEKR_MAP_API_URL: ${{ secrets.KIEKR_MAP_API_URL }}
        run: |
          set -o pipefail
          node scripts/sync.mjs | tee sync.log
          summary="$(grep '^SUMMARY ' sync.log | tail -n1 | sed 's/^SUMMARY //')"
          added="$(echo "$summary" | node -e 'let s=""; process.stdin.on("data",d=>s+=d).on("end",()=>{const o=JSON.parse(s);process.stdout.write(String(o.added))})')"
          resolved="$(echo "$summary" | node -e 'let s=""; process.stdin.on("data",d=>s+=d).on("end",()=>{const o=JSON.parse(s);process.stdout.write(String(o.resolved))})')"
          unsorted="$(echo "$summary" | node -e 'let s=""; process.stdin.on("data",d=>s+=d).on("end",()=>{const o=JSON.parse(s);process.stdout.write(String(o.unsorted_total))})')"
          {
            echo "added=$added"
            echo "resolved=$resolved"
            echo "unsorted=$unsorted"
          } >> "$GITHUB_OUTPUT"
          rm -f sync.log

      - name: Open or update sync PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "no diff, skipping PR"
            exit 0
          fi
          branch="sync/auto"
          git checkout -B "$branch"
          git add -A regions/ unsorted/ index.json README.md
          msg="sync: ${{ steps.run.outputs.added }} added, ${{ steps.run.outputs.resolved }} resolved, ${{ steps.run.outputs.unsorted }} unsorted"
          git commit -m "$msg"
          git push --force-with-lease origin "$branch"
          existing="$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number' || true)"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "$msg" --body "Automated sync from upstream."
            pr_number="$existing"
          else
            pr_number="$(gh pr create --base main --head "$branch" --title "$msg" --body "Automated sync from upstream." | sed -n 's#.*/pull/\([0-9]*\).*#\1#p')"
          fi
          gh pr merge "$pr_number" --merge --delete-branch --auto

      - name: Prune old workflow runs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --paginate \
            "repos/${{ github.repository }}/actions/workflows/sync.yml/runs" \
            --jq '.workflow_runs[].id' \
          | while read -r id; do
              if [ "$id" != "${{ github.run_id }}" ]; then
                gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$id" || true
              fi
            done
